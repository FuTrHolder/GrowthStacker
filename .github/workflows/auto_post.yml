name: Auto Blog Publisher

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 00:00) 실행
    - cron: "0 0 * * *"
  workflow_dispatch:   # 수동 실행 버튼 활성화

permissions:
  contents: write      # post_log.json 커밋을 위해 필요

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 저장소 체크아웃 ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python 설정 ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 의존성 설치 ─────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 포스팅 실행 ─────────────────────────────────────────
      - name: Run auto blog publisher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_SERVICE_ACCOUNT_JSON: ${{ secrets.BLOGGER_SERVICE_ACCOUNT_JSON }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: python main.py

      # ── 로그 파일 커밋 (영속 저장) ──────────────────────────
      - name: Commit post log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_log.json
          git diff --cached --quiet || git commit -m "chore: update post log [skip ci]"
          git push
